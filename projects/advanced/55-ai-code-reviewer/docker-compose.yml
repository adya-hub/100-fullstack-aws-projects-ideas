services:
    frontend:
      build: ./frontend
      ports:
        - "3000:3000"
      environment:
        NEXT_PUBLIC_API_URL: http://localhost:4000
      depends_on:
        - backend

    backend:
      build: ./backend
      ports:
        - "4000:4000"
      env_file:
        - .env
      depends_on:
        - db
        - redis

    db:
      image: postgres:16-alpine
      ports:
        - "5432:5432"
      environment:
        POSTGRES_USER=app
POSTGRES_PASSWORD=app
POSTGRES_DB=ai_code_reviewer

    redis:
      image: redis:7-alpine
      ports:
        - "6379:6379"

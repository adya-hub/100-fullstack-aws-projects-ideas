name: Deploy Reference Project

on:
  workflow_dispatch:
    inputs:
      project_path:
        description: Project directory path
        required: true
        default: projects/beginner/01-personal-expense-tracker
      aws_region:
        description: AWS region
        required: true
        default: us-east-1

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ inputs.aws_region }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build backend image
        working-directory: ${{ inputs.project_path }}/backend
        run: |
          npm ci
          npm run build
          docker build -t expense-api:${{ github.sha }} .

      - name: Terraform plan
        working-directory: ${{ inputs.project_path }}/infrastructure/terraform
        run: |
          terraform init -input=false
          terraform plan -input=false

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    name: Build ${{ matrix.project }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        project:
          - projects/beginner/01-personal-expense-tracker
          - projects/intermediate/27-real-time-chat-app
          - projects/advanced/51-ai-saas-platform
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install and build backend
        working-directory: ${{ matrix.project }}/backend
        run: |
          npm install
          npm run build --if-present

      - name: Install and build frontend
        working-directory: ${{ matrix.project }}/frontend
        run: |
          npm install
          npm run build --if-present

  terraform-validate:
    name: Validate Terraform
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Validate sample Terraform
        working-directory: docs/examples/terraform/vpc-ecs
        run: |
          terraform init -backend=false
          terraform validate

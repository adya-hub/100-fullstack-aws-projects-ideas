apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  labels:
    app: fullstack-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fullstack-api
  template:
    metadata:
      labels:
        app: fullstack-api
    spec:
      containers:
        - name: api
          image: YOUR_ECR_URI/api:latest
          ports:
            - containerPort: 4000
          envFrom:
            - secretRef:
                name: api-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: api
spec:
  selector:
    app: fullstack-api
  ports:
    - port: 80
      targetPort: 4000
  type: ClusterIP
